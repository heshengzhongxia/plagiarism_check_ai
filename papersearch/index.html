<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>六智Agent论文工坊 | LLM协作</title>
    <style>
        :root {
            --bg: #0f1119;
            --card: #1a1e2b;
            --text: #e0e6f0;
            --muted: #7b8ca8;
            --border: rgba(255,255,255,0.08);
            --accent: #5b9bd5;
            --gold: #f0c060;
            --danger: #e0556a;
            --success: #4caf84;
            --purple: #a78bfa;
            --touch-min: 44px;
        }
        *{margin:0;padding:0;box-sizing:border-box}

        body{
            background:linear-gradient(160deg,#0a0d15 0%,#151b28 40%,#1a1f30 100%);
            font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
            color:var(--text);
            height:100vh;height:100dvh;
            overflow:hidden;
            -webkit-tap-highlight-color:transparent;
        }
        .app{display:flex;flex-direction:column;height:100vh;height:100dvh}

        /* ============================================================
           Header
           ============================================================ */
        header{
            text-align:center;
            padding:clamp(0.3rem,1vw,0.6rem) 0;
            border-bottom:1px solid var(--border);
            flex-shrink:0;
        }
        header h1{
            font-size:clamp(1.1rem,2.5vw,1.6rem);
            font-weight:700;
            letter-spacing:1px;
            background:linear-gradient(135deg,#e8eef2,#a0c4e8);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }
        header .sub{color:var(--muted);font-size:clamp(0.6rem,1.2vw,0.75rem);letter-spacing:2px}

        /* ============================================================
           Main layout
           ============================================================ */
        .main{display:flex;flex:1;overflow:hidden}

        /* ----- Left Panel ----- */
        .left{
            width:clamp(280px,26vw,360px);
            flex-shrink:0;
            display:flex;flex-direction:column;
            border-right:1px solid var(--border);
            overflow-y:auto;
            padding:clamp(0.5rem,1.5vw,1rem);
            gap:clamp(0.3rem,0.8vw,0.6rem);
        }
        .left::-webkit-scrollbar{width:4px}
        .left::-webkit-scrollbar-thumb{background:#3a4255;border-radius:10px}

        /* ----- Right Panel ----- */
        .right{flex:1;display:flex;flex-direction:column;overflow:hidden}

        /* ============================================================
           Form elements
           ============================================================ */
        .paper-section label{
            font-weight:600;
            font-size:clamp(0.72rem,1.1vw,0.85rem);
            color:#c8d6e8;
            display:block;
            margin-bottom:0.3rem;
        }
        textarea{
            width:100%;
            min-height:clamp(80px,12vh,130px);
            background:#11151f;
            border:1px solid #3a4255;
            border-radius:0.8rem;
            padding:0.7rem 0.9rem;
            color:#e8eef5;
            font-size:clamp(0.78rem,1.1vw,0.85rem);
            font-family:inherit;
            resize:vertical;
            outline:none;
            transition:border-color 0.3s;
        }
        textarea:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(91,155,213,0.2)}

        /* Upload zone */
        .upload-zone{
            border:2px dashed #3a4255;
            border-radius:0.8rem;
            padding:clamp(0.5rem,1.2vw,0.8rem);
            text-align:center;
            cursor:pointer;
            transition:0.3s;
            min-height:var(--touch-min);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
        }
        .upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(91,155,213,0.06)}
        .upload-zone.uploading{opacity:0.6;pointer-events:none}
        .upload-zone.success{border-color:var(--success);background:rgba(76,175,132,0.05)}

        /* Toggle */
        .toggle-row{display:flex;align-items:center;gap:0.6rem}
        .toggle-row span{font-size:clamp(0.7rem,1vw,0.8rem);color:var(--muted)}
        .toggle{
            position:relative;
            width:clamp(40px,5vw,48px);
            height:clamp(22px,3vw,26px);
            cursor:pointer;
            flex-shrink:0;
        }
        .toggle input{display:none}
        .toggle .slider{
            position:absolute;inset:0;background:#3a4255;border-radius:24px;transition:0.3s;
        }
        .toggle .slider::before{
            content:'';position:absolute;
            width:clamp(16px,2vw,20px);
            height:clamp(16px,2vw,20px);
            left:3px;bottom:3px;
            background:#e0e6f0;border-radius:50%;transition:0.3s;
        }
        .toggle input:checked+.slider{background:var(--accent)}
        .toggle input:checked+.slider::before{transform:translateX(clamp(18px,2.5vw,22px))}

        /* Buttons */
        .btn-row{display:flex;gap:0.5rem;flex-wrap:wrap}
        .btn{
            padding:clamp(0.4rem,1vw,0.55rem) clamp(0.8rem,2vw,1.2rem);
            border-radius:1.5rem;
            border:1px solid rgba(255,255,255,0.15);
            font-weight:600;cursor:pointer;
            font-size:clamp(0.7rem,1vw,0.82rem);
            transition:all 0.2s;
            background:#2a3348;color:#e0e8f5;
            letter-spacing:0.5px;
            white-space:nowrap;
            min-height:var(--touch-min);
            display:inline-flex;align-items:center;justify-content:center;
        }
        .btn:hover{background:#364158}
        .btn:active{transform:scale(0.97)}
        .btn-primary{
            background:#3b5998;border-color:#5a7ec0;
            box-shadow:0 4px 12px rgba(59,89,152,0.35);
        }
        .btn-primary:hover{background:#4a6db5}
        .btn-primary:disabled{opacity:0.5;cursor:not-allowed}
        .btn-confirm{background:#2d7d46;border-color:#4caf84}
        .btn-retry{background:#8b3a3a;border-color:#e0556a}

        /* ============================================================
           Agent cards
           ============================================================ */
        .agents-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:clamp(0.3rem,0.6vw,0.5rem);
        }
        .agent-card{
            background:var(--card);
            border-radius:0.8rem;
            padding:clamp(0.4rem,0.8vw,0.6rem) clamp(0.2rem,0.4vw,0.4rem);
            display:flex;flex-direction:column;align-items:center;
            border:1px solid var(--border);
            transition:all 0.3s;
            position:relative;
            min-height:clamp(60px,8vh,75px);
            justify-content:center;
        }
        .agent-card .dot{
            width:clamp(6px,0.8vw,8px);
            height:clamp(6px,0.8vw,8px);
            border-radius:50%;
            position:absolute;top:4px;right:4px;
        }
        .agent-card .dot.idle{background:#5a6a80}
        .agent-card .dot.running{background:#f0a040;box-shadow:0 0 6px #f0a040;animation:pulse 1.2s infinite}
        .agent-card .dot.done{background:#4caf84;box-shadow:0 0 6px #4caf84}
        @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
        .agent-card .emoji{font-size:clamp(1.3rem,2.2vw,1.8rem)}
        .agent-card .name{font-size:clamp(0.6rem,0.9vw,0.72rem);font-weight:600;margin-top:2px;color:#f0f4fa}
        .agent-card .role{font-size:clamp(0.48rem,0.7vw,0.58rem);color:var(--muted)}
        .agent-card.active{border-color:var(--gold);box-shadow:0 0 12px rgba(240,192,96,0.25)}

        /* ============================================================
           Source selector
           ============================================================ */
        .source-section .title{
            font-size:clamp(0.68rem,0.9vw,0.75rem);
            color:var(--muted);
            cursor:pointer;
            user-select:none;
            padding:0.3rem 0;
            min-height:var(--touch-min);
            display:flex;align-items:center;
        }
        .source-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px}
        .source-chip{
            display:flex;align-items:center;gap:4px;
            font-size:clamp(0.62rem,0.8vw,0.68rem);
            color:#c8d6e8;cursor:pointer;
            padding:clamp(3px,0.5vw,5px);
            border-radius:4px;
            transition:0.2s;
            min-height:var(--touch-min);
        }
        .source-chip:hover{background:rgba(255,255,255,0.04)}
        .source-chip input{accent-color:var(--accent);width:15px;height:15px;margin:0;cursor:pointer}
        .source-chip.off{color:#5a6a80;text-decoration:line-through}

        /* ============================================================
           Modal (Captcha / Login)
           ============================================================ */
        .modal-overlay{
            display:none;position:fixed;inset:0;
            background:rgba(0,0,0,0.7);z-index:999;
            justify-content:center;align-items:center;
        }
        .modal-overlay.show{display:flex}
        .modal-box{
            background:#1a1e2b;border-radius:1rem;
            padding:clamp(1rem,2vw,1.5rem);
            width:min(90vw,420px);
            border:1px solid var(--border);
            text-align:center;
            max-height:90vh;max-height:90dvh;
            overflow-y:auto;
        }
        .modal-box img{max-width:100%;border-radius:0.5rem;margin:0.5rem 0}
        .modal-box input{
            width:100%;padding:0.6rem;
            border-radius:0.5rem;
            border:1px solid #3a4255;
            background:#11151f;color:#e8eef5;
            font-size:clamp(0.85rem,1.2vw,0.95rem);
            text-align:center;margin:0.4rem 0;
            min-height:var(--touch-min);
        }
        .modal-box .btn-row{justify-content:center;margin-top:0.5rem}

        /* ============================================================
           Chat area
           ============================================================ */
        .chat-header{
            padding:clamp(0.4rem,0.8vw,0.6rem) clamp(0.6rem,1.2vw,1rem);
            border-bottom:1px solid var(--border);
            font-weight:600;
            font-size:clamp(0.75rem,1vw,0.85rem);
            color:var(--muted);
            flex-shrink:0;
            display:flex;justify-content:space-between;align-items:center;
        }
        .chat-body{
            flex:1;overflow-y:auto;
            padding:clamp(0.5rem,1vw,1rem);
            display:flex;flex-direction:column;gap:0.5rem;
            -webkit-overflow-scrolling:touch;
        }
        .chat-body::-webkit-scrollbar{width:4px}
        .chat-body::-webkit-scrollbar-track{background:transparent}
        .chat-body::-webkit-scrollbar-thumb{background:#3a4255;border-radius:10px}

        /* Chat bubbles */
        .bubble{display:flex;gap:0.5rem;align-items:flex-start;animation:fadeIn 0.3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .bubble .avatar{
            width:clamp(28px,4vw,32px);
            height:clamp(28px,4vw,32px);
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:clamp(0.9rem,1.3vw,1rem);
            flex-shrink:0;
            background:rgba(255,255,255,0.06);
        }
        .bubble .body{flex:1;min-width:0}
        .bubble .head{
            font-size:clamp(0.62rem,0.8vw,0.7rem);
            color:var(--muted);margin-bottom:2px;
        }
        .bubble .text{
            background:rgba(255,255,255,0.05);
            border-radius:0 0.8rem 0.8rem 0.8rem;
            padding:clamp(0.4rem,0.7vw,0.5rem) clamp(0.5rem,1vw,0.8rem);
            font-size:clamp(0.75rem,1vw,0.82rem);
            line-height:1.5;
            border-left:3px solid var(--accent);
            word-break:break-word;
        }
        .bubble.system .text{border-left-color:var(--muted);background:rgba(255,255,255,0.03);font-size:clamp(0.68rem,0.9vw,0.75rem)}

        /* Confirm buttons in bubble */
        .confirm-btns{display:flex;gap:0.5rem;margin-top:8px;flex-wrap:wrap}
        .confirm-btns .btn{padding:0.4rem 1rem;font-size:0.75rem}

        /* ============================================================
           Report
           ============================================================ */
        .report-section{
            margin:clamp(0.3rem,0.8vw,0.6rem);
            padding:clamp(0.5rem,1vw,0.8rem);
            background:rgba(20,24,38,0.95);
            border-radius:1rem;
            border:1px solid rgba(76,175,132,0.4);
            flex-shrink:0;
            max-height:40vh;
            overflow-y:auto;
            display:none;
            -webkit-overflow-scrolling:touch;
        }
        .report-section h3{color:var(--success);font-size:clamp(0.85rem,1.2vw,1rem)}
        .report-section .r-item{margin-bottom:0.6rem;padding-bottom:0.6rem;border-bottom:1px solid rgba(255,255,255,0.05)}
        .report-section .r-label{font-size:clamp(0.62rem,0.8vw,0.7rem);color:var(--muted);text-transform:uppercase}
        .report-section .r-value{font-size:clamp(0.75rem,1vw,0.85rem);margin-top:2px}
        .risk-high{color:#e0556a;font-weight:700}
        .risk-mid{color:#f0a040;font-weight:700}
        .risk-low{color:#4caf84;font-weight:700}
        .sug-item{
            background:#1a1e2b;border-radius:0.6rem;
            padding:0.5rem 0.7rem;margin:0.3rem 0;
            border-left:3px solid var(--accent);
            font-size:clamp(0.7rem,0.9vw,0.8rem);
            word-break:break-word;
        }

        /* ============================================================
           Mobile Tab Bar
           ============================================================ */
        .mobile-tabs{
            display:none;
            flex-shrink:0;
            border-bottom:1px solid var(--border);
            background:var(--card);
        }
        .mobile-tab{
            flex:1;text-align:center;
            padding:0.5rem 0.3rem;
            font-size:0.75rem;color:var(--muted);
            cursor:pointer;border-bottom:2px solid transparent;
            transition:all 0.2s;
            min-height:var(--touch-min);
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:2px;
        }
        .mobile-tab .tab-icon{font-size:1.1rem}
        .mobile-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
        .mobile-tab .badge{
            background:var(--danger);color:#fff;
            font-size:0.55rem;border-radius:10px;
            padding:1px 6px;display:none;
        }
        .mobile-tab .badge.show{display:inline-block}

        /* Mobile floating action button */
        .fab{
            display:none;
            position:fixed;
            bottom:clamp(12px,3vh,20px);
            left:50%;transform:translateX(-50%);
            z-index:100;
            background:var(--accent);
            color:#fff;border:none;
            border-radius:2rem;
            padding:0.7rem 2rem;
            font-size:0.9rem;font-weight:700;
            cursor:pointer;
            box-shadow:0 4px 20px rgba(91,155,213,0.5);
            letter-spacing:1px;
            min-height:var(--touch-min);
            white-space:nowrap;
        }
        .fab:active{transform:translateX(-50%) scale(0.95)}
        .fab:disabled{opacity:0.4;cursor:not-allowed}

        /* ============================================================
           Responsive: Tablet (768-1024px)
           ============================================================ */
        @media(max-width:1024px){
            .left{width:clamp(240px,32vw,300px)}
            .agents-grid{grid-template-columns:repeat(2,1fr)}
            .source-grid{grid-template-columns:repeat(2,1fr)}
        }

        /* ============================================================
           Responsive: Mobile (<768px)
           ============================================================ */
        @media(max-width:767px){
            body{overflow:hidden}
            .app{height:100vh;height:100dvh}

            /* Header compact */
            header{padding:0.35rem 0}
            header h1{font-size:1rem}
            header .sub{font-size:0.6rem;letter-spacing:1px}

            /* Mobile tabs visible */
            .mobile-tabs{display:flex}

            /* Main becomes single column, tab-driven */
            .main{flex-direction:column;position:relative}

            /* Left panel: full width, scrollable, hidden by tab */
            .left{
                width:100%;flex-shrink:1;
                border-right:none;
                border-bottom:1px solid var(--border);
                max-height:none;
                overflow-y:auto;
                padding:0.6rem;
                display:flex;
            }
            .left.panel-hidden{display:none}

            /* Right panel: hidden by tab */
            .right{display:flex}
            .right.panel-hidden{display:none}

            /* Report as independent panel */
            .report-section.mobile-report{
                margin:0;border-radius:0;border:none;
                max-height:none;flex:1;overflow-y:auto;
            }

            /* Agent grid 3 columns even on mobile (compact) */
            .agents-grid{grid-template-columns:repeat(3,1fr);gap:0.3rem}
            .agent-card{padding:0.35rem 0.2rem;min-height:55px;border-radius:0.6rem}
            .agent-card .emoji{font-size:1.2rem}
            .agent-card .name{font-size:0.6rem}
            .agent-card .role{font-size:0.5rem}

            /* Source grid full width */
            .source-grid{grid-template-columns:repeat(3,1fr)}

            /* FAB visible */
            .fab{display:block}

            /* Chat body */
            .chat-body{padding:0.5rem}
            .chat-header{padding:0.4rem 0.6rem;font-size:0.75rem}

            /* Modal fullscreen on mobile */
            .modal-box{
                width:100vw;max-width:100vw;
                height:100vh;height:100dvh;
                max-height:100vh;max-height:100dvh;
                border-radius:0;padding:1rem;
                display:flex;flex-direction:column;justify-content:center;
            }

            /* Larger touch targets */
            textarea{min-height:90px;font-size:16px} /* 16px prevents iOS zoom */
            .btn{min-height:40px}
            .source-chip{min-height:36px;padding:6px}
            .upload-zone{min-height:50px;padding:0.6rem}

            /* Report header buttons wrap */
            .report-section div:first-child{flex-wrap:wrap;gap:0.3rem}
        }

        /* ============================================================
           Tiny screens (<380px)
           ============================================================ */
        @media(max-width:379px){
            .agents-grid{grid-template-columns:repeat(3,1fr);gap:0.2rem}
            .agent-card{padding:0.25rem 0.1rem;min-height:48px}
            .agent-card .emoji{font-size:1rem}
            .btn{padding:0.35rem 0.7rem;font-size:0.68rem}
            .source-grid{grid-template-columns:repeat(2,1fr)}
            .bubble .text{font-size:0.72rem}
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Header -->
    <header>
        <h1>📜 六智Agent论文工坊</h1>
        <p class="sub">LLM驱动 · 多智能体协作 · 论文深度检验</p>
    </header>

    <!-- Mobile Tab Bar -->
    <div class="mobile-tabs" id="mobileTabs">
        <div class="mobile-tab active" data-panel="input" onclick="switchMobileTab('input')">
            <span class="tab-icon">📝</span>输入
        </div>
        <div class="mobile-tab" data-panel="chat" onclick="switchMobileTab('chat')">
            <span class="tab-icon">💬</span>对话
            <span class="badge" id="chatBadge">●</span>
        </div>
        <div class="mobile-tab" data-panel="report" onclick="switchMobileTab('report')">
            <span class="tab-icon">📋</span>报告
            <span class="badge" id="reportBadge">●</span>
        </div>
    </div>

    <!-- Main content -->
    <div class="main">
        <!-- Left Panel -->
        <div class="left" id="leftPanel">
            <div class="paper-section">
                <label>📄 上传论文文件（PDF / Word / TXT）</label>
                <div id="uploadZone" class="upload-zone" onclick="document.getElementById('fileInput').click()">
                    <div id="uploadIcon">📁</div>
                    <div id="uploadText">点击上传 或 拖拽文件到此处</div>
                    <div id="uploadStatus" style="font-size:clamp(0.62rem,0.8vw,0.7rem);color:var(--muted);margin-top:4px"></div>
                    <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt" style="display:none" onchange="handleFileSelect(event)">
                </div>
                <label style="margin-top:0.6rem">📝 或直接粘贴论文内容</label>
                <textarea id="paperInput" placeholder="粘贴论文内容...">基于深度学习与多头注意力机制的城市交通流预测研究。本文提出了一个时空图卷积网络，结合多头注意力机制，用于捕获复杂交通模式，在真实数据集上取得了优异性能。通过融合图神经网络与Transformer架构，在多个公开数据集上验证了方法的有效性。</textarea>
            </div>

            <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
                <span style="font-size:clamp(0.68rem,0.9vw,0.75rem);color:var(--muted)">相似度阈值:</span>
                <input type="number" id="thresholdInput" value="60" min="30" max="95" step="5"
                    style="width:clamp(50px,7vw,60px);padding:0.4rem 0.5rem;border-radius:0.5rem;border:1px solid #3a4255;background:#11151f;color:#e8eef5;font-size:0.8rem;text-align:center;min-height:var(--touch-min)">
                <span style="font-size:clamp(0.68rem,0.9vw,0.75rem);color:var(--muted)">%</span>
            </div>

            <!-- 知网论文上传 -->
            <div class="source-section" id="cnkiSection">
                <div class="title" style="font-size:clamp(0.68rem,0.9vw,0.75rem);color:var(--muted)">📚 知网对比论文（可选）</div>
                <div style="font-size:clamp(0.58rem,0.7vw,0.65rem);color:var(--muted);margin:2px 0">
                    先点「提取关键词」→ 拿关键词去知网搜 → 下载PDF → 回来上传 → 再点「开始比对」
                </div>
                <div id="cnkiKwDisplay" style="font-size:clamp(0.72rem,1vw,0.85rem);color:var(--gold);margin:6px 0;min-height:20px;padding:6px 10px;background:rgba(240,192,96,0.08);border-radius:0.5rem;border:1px solid rgba(240,192,96,0.2)"></div>
                <input type="file" id="cnkiPdfInput" accept=".pdf" multiple onchange="uploadCnkiPdfs()"
                    style="font-size:clamp(0.7rem,0.9vw,0.78rem);color:var(--muted);margin-top:6px;display:block"
                    title="支持同时选择多个PDF文件">
                <div style="font-size:0.6rem;color:var(--muted)">支持多文件同时上传（Ctrl/Cmd + 点击多选）</div>
                <div id="cnkiPdfStatus" style="font-size:clamp(0.6rem,0.75vw,0.68rem);color:var(--success);margin-top:4px"></div>
            </div>

            <div class="toggle-row">
                <label class="toggle">
                    <input type="checkbox" id="autoToggle" checked onchange="onAutoToggle()">
                    <span class="slider"></span>
                </label>
                <span id="autoLabel">🔄 自动流转（开启）</span>
            </div>

            <!-- Paper source selector -->
            <div class="source-section">
                <div class="title" onclick="toggleSources()">📚 论文库来源 ▾ <span id="sourceSummary" style="font-weight:400;font-size:clamp(0.58rem,0.7vw,0.65rem);color:var(--muted)">(全部7个)</span></div>
                <div class="source-grid" id="sourceGrid"></div>
            </div>

            <div class="btn-row" id="actionButtons">
                <button class="btn btn-primary" id="startBtn" onclick="startAnalysis()">🚀 启动协作</button>
                <button class="btn" id="keywordBtn" onclick="extractKeywordsFirst()" style="font-size:0.7rem">🔑 提取关键词</button>
                <button class="btn" onclick="resetAll()">🧹 清空重置</button>
            </div>

            <!-- Agent status cards -->
            <div class="agents-grid" id="agentsGrid"></div>
        </div>

        <!-- Right Panel: Chat -->
        <div class="right" id="rightPanel">
            <div class="chat-header">
                <span>💬 Agent协作对话</span>
                <span id="msgCount" style="font-size:clamp(0.62rem,0.8vw,0.7rem)">就绪</span>
            </div>
            <!-- 批次进度条 -->
            <div id="batchBar" style="display:none;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--card)">
                <div style="display:flex;justify-content:space-between;margin-bottom:3px">
                    <span id="batchLabel" style="font-size:0.7rem;color:var(--gold)">批次处理中...</span>
                    <span id="batchPct" style="font-size:0.65rem;color:var(--muted)">0%</span>
                </div>
                <div style="width:100%;height:4px;background:#2a3040;border-radius:2px;overflow:hidden">
                    <div id="batchFill" style="height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width 0.5s"></div>
                </div>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="bubble system">
                    <div class="avatar">🤖</div>
                    <div class="body">
                        <div class="text">系统就绪，等待论文输入...<br>点击「启动协作」开始六Agent分析流程。</div>
                    </div>
                </div>
            </div>

            <!-- Report -->
            <div class="report-section" id="reportSection">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem;flex-wrap:wrap;gap:0.3rem">
                    <h3 style="margin:0">📋 最终分析报告</h3>
                    <div style="display:flex;gap:0.3rem;flex-wrap:wrap">
                        <button class="btn btn-primary" onclick="downloadReport()" style="padding:0.3rem 0.7rem;font-size:0.7rem">📥 摘要</button>
                        <button class="btn btn-primary" id="downloadDocxBtn" onclick="downloadDocx()" style="padding:0.3rem 0.7rem;font-size:0.7rem;display:none">📄 .docx</button>
                    </div>
                </div>
                <div id="reportBody"></div>
            </div>
        </div>
    </div>

    <!-- Mobile Floating Action Button -->
    <button class="fab" id="fabBtn" onclick="onFabClick()">🚀 启动协作</button>
</div>

<script>
// ============ Agent配置 ============
const AGENTS = [
    {id:'agent1',name:'深析·奥利',role:'论文解析',emoji:'🔍',color:'#5b9bd5'},
    {id:'agent2',name:'猎手·艾瑞',role:'网络检索',emoji:'🕸️',color:'#f0a040'},
    {id:'agent3',name:'校验·维拉',role:'语义查重比对',emoji:'⚖️',color:'#e0556a'},
    {id:'agent4',name:'解构·雷欧',role:'修改方向分析',emoji:'📖',color:'#4caf84'},
    {id:'agent5',name:'智囊·赛诺',role:'修改建议',emoji:'💡',color:'#f0c060'},
    {id:'agent6',name:'整合·尤娜',role:'信息整合',emoji:'📋',color:'#a78bfa'},
];

let currentTaskId = null;
let pollingTimer = null;
let isProcessing = false;
let lastMsgIdx = 0;
let lastReport = null;
let selectedSources = ['all'];
let allSourcesData = [];
let currentMobileTab = 'input';

// ============ Mobile Tab Switching ============
function switchMobileTab(tab) {
    currentMobileTab = tab;
    const left = document.getElementById('leftPanel');
    const right = document.getElementById('rightPanel');
    const fab = document.getElementById('fabBtn');
    const report = document.getElementById('reportSection');

    // Update tab active states
    document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.mobile-tab[data-panel="${tab}"]`).classList.add('active');

    const isMobile = window.innerWidth < 768;

    if (tab === 'input') {
        left.classList.remove('panel-hidden');
        right.classList.add('panel-hidden');
        fab.style.display = isMobile ? 'block' : 'none';
    } else if (tab === 'chat') {
        left.classList.add('panel-hidden');
        right.classList.remove('panel-hidden');
        fab.style.display = 'none';
        // Show chat, hide report in right panel
        document.getElementById('chatBody').style.display = '';
        document.querySelector('.chat-header').style.display = '';
        if (report) report.style.display = 'none';
    } else if (tab === 'report') {
        left.classList.add('panel-hidden');
        right.classList.remove('panel-hidden');
        fab.style.display = 'none';
        // Show report in right panel
        if (lastReport) {
            document.getElementById('chatBody').style.display = 'none';
            document.querySelector('.chat-header').style.display = 'none';
            if (report) {
                report.style.display = 'block';
                report.style.maxHeight = 'none';
                report.style.flex = '1';
            }
        }
    }
}

function onFabClick() {
    if (isProcessing) return;
    // On mobile, switch to chat tab after starting
    if (window.innerWidth < 768) {
        switchMobileTab('chat');
    }
    startAnalysis();
}

// Update FAB state
function updateFab() {
    const fab = document.getElementById('fabBtn');
    const isMobile = window.innerWidth < 768;
    if (isProcessing) {
        fab.textContent = '⏳ 协作中...';
        fab.disabled = true;
    } else if (!_keywordsReady) {
        fab.textContent = '🔑 提取关键词';
        fab.disabled = false;
        fab.onclick = extractKeywordsFirst;
    } else {
        fab.textContent = '🚀 开始比对';
        fab.disabled = false;
        fab.onclick = onFabClick;
    }
    if (isMobile && currentMobileTab !== 'input') {
        fab.style.display = 'none';
    } else if (isMobile) {
        fab.style.display = 'block';
    }
}

// ============ Source Selector ============
async function loadSources() {
    try {
        const res = await fetch('/api/sources');
        const data = await res.json();
        allSourcesData = data.sources;
        renderSourceGrid();
    } catch(e) {
        setTimeout(loadSources, 2000);
    }
}

function renderSourceGrid() {
    const grid = document.getElementById('sourceGrid');
    grid.innerHTML = allSourcesData.map(s => {
        const checked = selectedSources.includes('all') || selectedSources.includes(s.id);
        const cls = checked ? '' : 'off';
        return `<label class="source-chip ${cls}">
            <input type="checkbox" value="${s.id}" ${checked?'checked':''} onchange="onSourceChange()">
            ${s.name}
        </label>`;
    }).join('');
    updateSourceSummary();
}

function onSourceChange() {
    const checks = document.querySelectorAll('#sourceGrid input');
    selectedSources = [];
    checks.forEach(c => { if (c.checked) selectedSources.push(c.value); });
    if (selectedSources.length === allSourcesData.length) selectedSources = ['all'];
    if (selectedSources.length === 0) { selectedSources = ['all']; renderSourceGrid(); return; }
    updateSourceSummary();
    document.querySelectorAll('.source-chip').forEach((chip, i) => {
        chip.className = 'source-chip' + (selectedSources.includes('all') || selectedSources.includes(allSourcesData[i].id) ? '' : ' off');
    });
}

function toggleSources() {
    const grid = document.getElementById('sourceGrid');
    grid.style.display = grid.style.display === 'none' ? '' : 'none';
}

function updateSourceSummary() {
    const s = document.getElementById('sourceSummary');
    if (selectedSources.includes('all') || selectedSources.length === allSourcesData.length) {
        s.textContent = `(全部${allSourcesData.length}个)`;
    } else {
        s.textContent = `(已选${selectedSources.length}个)`;
    }
}

function getSelectedSources() {
    if (selectedSources.includes('all')) return null;
    return selectedSources;
}

// ============ File Upload ============
function handleFileSelect(event) {
    const file = event.target.files[0];
    if (file) uploadFile(file);
}

const uploadZone = document.getElementById('uploadZone');
if (uploadZone) {
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) uploadFile(file);
    });
}

async function uploadFile(file) {
    const zone = document.getElementById('uploadZone');
    const status = document.getElementById('uploadStatus');
    const icon = document.getElementById('uploadIcon');
    const text = document.getElementById('uploadText');

    zone.classList.add('uploading');
    icon.textContent = '⏳';
    text.textContent = '正在解析文件...';
    status.textContent = file.name;

    const formData = new FormData();
    formData.append('file', file);

    try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.error) {
            status.textContent = '❌ ' + data.error;
            zone.classList.remove('uploading');
            icon.textContent = '📁';
            text.textContent = '点击上传 或 拖拽文件到此处';
        } else {
            document.getElementById('paperInput').value = data.text;
            zone.classList.remove('uploading');
            zone.classList.add('success');
            icon.textContent = '✅';
            text.textContent = file.name;
            status.textContent = `已解析 ${data.char_count} 字符`;
        }
    } catch(e) {
        status.textContent = '❌ 上传失败: ' + e.message;
        zone.classList.remove('uploading');
        icon.textContent = '📁';
        text.textContent = '点击上传 或 拖拽文件到此处';
    }
}

// ============ Init ============
function renderAgents(statusData) {
    const grid = document.getElementById('agentsGrid');
    grid.innerHTML = '';
    AGENTS.forEach(a => {
        const sd = (statusData && statusData[a.id]) || {status:'待命',progress:0};
        let dotClass = 'idle';
        if (sd.status === '运行中') dotClass = 'running';
        else if (sd.status === '完成') dotClass = 'done';
        const active = (currentTaskId && sd.status === '运行中') ? ' active' : '';
        grid.innerHTML += `
            <div class="agent-card${active}">
                <div class="dot ${dotClass}"></div>
                <div class="emoji">${a.emoji}</div>
                <div class="name">${a.name}</div>
                <div class="role">${a.role}</div>
            </div>`;
    });
}

function onAutoToggle() {
    const on = document.getElementById('autoToggle').checked;
    document.getElementById('autoLabel').textContent = on ? '🔄 自动流转（开启）' : '⏸️ 手动确认（关闭）';
}

function resetAll() {
    stopPolling();
    currentTaskId = null;
    isProcessing = false;
    lastMsgIdx = 0;
    lastReport = null;
    _keywordsReady = false;
    cnkiPapers = [];
    // 重置关键词按钮
    const kwBtn = document.getElementById('keywordBtn');
    kwBtn.disabled = false;
    kwBtn.textContent = '🔑 提取关键词';
    kwBtn.style.background = '';
    kwBtn.style.borderColor = '';
    // 重置开始按钮
    const startBtn = document.getElementById('startBtn');
    startBtn.disabled = false;
    startBtn.textContent = '🚀 启动协作';
    startBtn.style.background = '';
    startBtn.style.borderColor = '';
    document.getElementById('cnkiKwDisplay').innerHTML = '';
    document.getElementById('cnkiPdfStatus').textContent = '';
    document.getElementById('cnkiPdfInput').value = '';
    document.getElementById('reportSection').style.display = 'none';
    document.getElementById('reportSection').style.maxHeight = '';
    document.getElementById('reportSection').style.flex = '';
    document.getElementById('chatBody').style.display = '';
    document.querySelector('.chat-header').style.display = '';
    document.getElementById('chatBody').innerHTML = `
        <div class="bubble system">
            <div class="avatar">🤖</div>
            <div class="body">
                <div class="text">已重置，等待新的论文输入...</div>
            </div>
        </div>`;
    document.getElementById('msgCount').textContent = '就绪';
    document.getElementById('batchBar').style.display = 'none';
    document.getElementById('downloadDocxBtn').style.display = 'none';
    document.getElementById('reportBadge').classList.remove('show');
    document.getElementById('chatBadge').classList.remove('show');
    renderAgents();
    updateFab();
}

// ============ API ============

let _keywordsReady = false;  // 是否已提取关键词（知网两阶段模式）
let cnkiPapers = [];        // 用户上传的知网论文全文

async function extractKeywordsFirst() {
    const paper = document.getElementById('paperInput').value.trim();
    if (!paper) { alert('请先输入论文内容'); return; }

    const btn = document.getElementById('keywordBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 提取中...';

    try {
        const res = await fetch('/api/keywords', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paper })
        });
        const data = await res.json();
        if (data.error) { alert(data.error); btn.disabled = false; btn.textContent = '🔑 提取关键词'; return; }

        // 显示关键词
        const kwDisplay = document.getElementById('cnkiKwDisplay');
        kwDisplay.innerHTML = data.keywords.map((kw, i) =>
            `<span style="background:rgba(240,192,96,0.15);padding:2px 8px;border-radius:4px;margin:2px;display:inline-block">${i+1}. ${kw}</span>`
        ).join(' ');

        // 渲染 agent1 对话到聊天区
        if (data.messages && data.messages.length > 0) {
            document.getElementById('chatBody').innerHTML = '';
            renderMessages(data.messages);
            document.getElementById('msgCount').textContent = data.messages.length + ' 条消息';
        }

        _keywordsReady = true;
        btn.textContent = '✅ 已提取';
        btn.style.background = '#2d7d46';
        btn.style.borderColor = '#4caf84';

        // 主按钮改为"开始比对（含知网）"，提醒用户上传后点这里
        const startBtn = document.getElementById('startBtn');
        startBtn.textContent = '🚀 开始比对（含知网）';
        startBtn.style.background = '#2d7d46';
        startBtn.style.borderColor = '#4caf84';
        updateFab();

    } catch (e) {
        alert('提取失败: ' + e.message);
        btn.disabled = false;
        btn.textContent = '🔑 提取关键词';
    }
}

async function startAnalysis() {
    if (isProcessing) return;
    const paper = document.getElementById('paperInput').value.trim();
    if (!paper) { alert('请先输入论文内容'); return; }

    isProcessing = true;
    lastMsgIdx = 0;
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 协作中...';
    updateFab();

    const autoMode = document.getElementById('autoToggle').checked;
    document.getElementById('chatBody').innerHTML = '';
    document.getElementById('reportSection').style.display = 'none';
    try {
        const res = await fetch('/api/start', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({paper, auto_mode:autoMode, sources:getSelectedSources(), threshold:parseInt(document.getElementById('thresholdInput').value)||60, cnki_papers:cnkiPapers})
        });
        const data = await res.json();
        if (data.error) { alert(data.error); resetAll(); return; }
        currentTaskId = data.task_id;
        startPolling();
    } catch(e) {
        addSystemMsg('启动失败: ' + e.message);
        resetAll();
    }
}

function startPolling() {
    stopPolling();
    pollingTimer = setInterval(pollStatus, 800);
}

function stopPolling() {
    if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
}

let _pollBusy = false;

async function pollStatus() {
    if (!currentTaskId) return;
    // 防并发：上一次请求未完成则跳过本次
    if (_pollBusy) return;
    _pollBusy = true;
    try {
        const res = await fetch(`/api/status/${currentTaskId}?since=${lastMsgIdx}`);
        const data = await res.json();

        if (data.conversation && data.conversation.length > 0) {
            renderMessages(data.conversation);
            lastMsgIdx = data.total_messages;
            // 进度条
            const bar = document.getElementById('batchBar');
            const fill = document.getElementById('batchFill');
            const label = document.getElementById('batchLabel');
            const pctEl = document.getElementById('batchPct');
            if (data.batch_progress) {
                bar.style.display = '';
                label.textContent = `📦 批次处理 ${data.batch_progress}`;
                const pct = data.batch_pct || 0;
                fill.style.width = pct + '%';
                pctEl.textContent = pct + '%';
                document.getElementById('msgCount').textContent = `批次 ${data.batch_progress}`;
            } else {
                bar.style.display = 'none';
                document.getElementById('msgCount').textContent = `${data.total_messages} 条消息`;
            }
            if (window.innerWidth < 768 && currentMobileTab !== 'chat') {
                document.getElementById('chatBadge').classList.add('show');
            }
        }

        renderAgents(data.agents_status);

        if (data.cnki_task_id) {
            pollCnkiStatus(data.cnki_task_id);
        }

        if (data.status === 'completed') {
            stopPolling();
            isProcessing = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = '🚀 启动协作';
            updateFab();
            addSystemMsg('✅ 分析完成！报告见下方。');
            if (data.docx_ready) {
                document.getElementById('downloadDocxBtn').style.display = '';
            }
            document.getElementById('reportBadge').classList.add('show');
            const rr = await fetch(`/api/report/${currentTaskId}`);
            lastReport = await rr.json();
            renderReport(lastReport);
        }
    } catch(e) { /* 静默 */ }
    _pollBusy = false;
}

// ============ Chat rendering ============
function addSystemMsg(msg) {
    const el = document.getElementById('chatBody');
    el.innerHTML += `<div class="bubble system">
        <div class="avatar">🤖</div><div class="body"><div class="text">${msg}</div></div>
    </div>`;
    scrollChat();
}

function renderMessages(msgs) {
    const el = document.getElementById('chatBody');
    msgs.forEach(m => {
        const isSystem = m.agent_id === 'system';
        const color = m.color || '#5b9bd5';
        const nameTag = isSystem ? '' : `<div class="head" style="color:${color}">${m.emoji} ${m.agent_name}</div>`;
        let extra = '';
        if (m.needs_confirm) {
            extra = `<div class="confirm-btns">
                <button class="btn btn-confirm" onclick="doConfirm()">✅ 确认继续</button>
                <button class="btn btn-retry" onclick="doRetry()">🔄 重来</button>
            </div>`;
        }
        el.innerHTML += `<div class="bubble${isSystem?' system':''}">
            <div class="avatar">${m.emoji||'🤖'}</div>
            <div class="body">${nameTag}
                <div class="text" style="border-left-color:${color}">${m.message}${extra}</div>
            </div>
        </div>`;
    });
    scrollChat();
}

function scrollChat() {
    const el = document.getElementById('chatBody');
    setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
}

async function doConfirm() {
    if (!currentTaskId) return;
    try { await fetch(`/api/confirm/${currentTaskId}`, {method:'POST'}); } catch(e) {}
}

async function doRetry() {
    if (!currentTaskId) return;
    try { await fetch(`/api/retry/${currentTaskId}`, {method:'POST'}); } catch(e) {}
}

// ============ Report ============
function renderReport(data) {
    const r = data.report || {};
    const results = data.agent_results || {};

    if (data.docx_ready) {
        document.getElementById('downloadDocxBtn').style.display = '';
    }

    const a3 = results.agent3 || {};
    const matches = r.matches || a3.matches || [];
    const matchRows = matches.slice(0, 10).map((m, i) =>
        `<div class="sug-item">
            <span class="risk-high">[重复${i+1}]</span> <strong>${(m.user_sentence||'').substring(0,60)}...</strong>
            <br><span style="color:#f0a040">相似句:</span> ${(m.similar_sentence||'').substring(0,60)}...
            <br><span style="font-size:0.65rem;color:var(--muted)">来源: ${m.source_title||''} | 相似度: ${m.similarity||'?'}%</span>
        </div>`
    ).join('');

    const mods = r.modifications || [];
    const modRows = mods.slice(0, 5).map(m =>
        `<div class="sug-item">
            <span style="color:#4caf84">[修改]</span> <strong>${(m.user_sentence||'').substring(0,50)}...</strong>
            <br>→ ${(m.modified_sentence||'').substring(0,80)}...
        </div>`
    ).join('');

    const suggestions = r.overall_suggestions || [];
    const sugRows = suggestions.map(s =>
        `<div class="sug-item"><span class="${s.priority==='高'?'risk-high':s.priority==='中'?'risk-mid':'risk-low'}">[${s.priority||'?'}]</span> <strong>${s.type||s.title||''}</strong>：${s.content||''}</div>`
    ).join('');

    const a1 = results.agent1 || {};
    const title = a1.title || '?';
    const realPapers = data.real_papers || null;
    let papersHtml = '';
    if (realPapers && realPapers.papers && realPapers.papers.length > 0) {
        papersHtml = realPapers.papers.map(p => {
            const link = p.url ? ` <a href="${p.url}" target="_blank" style="color:#5b9bd5;font-size:0.7rem">🔗</a>` : '';
            return `<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03)">
                <span style="font-size:0.78rem">${(p.title||'?').substring(0,80)}</span>${link}
                <span style="font-size:0.62rem;color:var(--muted)"> [${p.source||'?'}]</span></div>`;
        }).join('');
    } else {
        papersHtml = '<div style="color:#5a6a80;font-size:0.75rem">暂无检索数据</div>';
    }

    document.getElementById('reportBody').innerHTML = `
        <div class="r-item"><div class="r-label">📄 论文标题</div>
            <div class="r-value">${title}</div></div>
        <div class="r-item"><div class="r-label">🤖 AIGC检测</div>
            <div class="r-value">概率: <strong>${r.aigc_rate||'?'}%</strong> — ${r.aigc_analysis||'未检测'}</div></div>
        <div class="r-item"><div class="r-label">📚 检索到的相似论文 (${realPapers?.total||0} 篇)</div>
            <div class="r-value" style="max-height:250px;overflow-y:auto">${papersHtml}</div></div>
        <div class="r-item"><div class="r-label">📊 查重结果</div>
            <div class="r-value">共检测到 <strong>${r.total_matches||0}</strong> 处重复句子 | 风险评估: <strong>${r.risk_assessment||'?'}</strong></div>
            <div style="max-height:300px;overflow-y:auto;margin-top:6px">${matchRows||'<div style="color:#5a6a80">无重复句子</div>'}</div></div>
        <div class="r-item"><div class="r-label">✏️ 修改方案 (${r.total_modifications||0} 条)</div>
            <div style="max-height:200px;overflow-y:auto">${modRows||'<div style="color:#5a6a80">无</div>'}</div></div>
        <div class="r-item"><div class="r-label">💡 总体建议 (${r.total_suggestions||0} 条)</div>
            ${sugRows||'<div style="color:#5a6a80">无</div>'}</div>
        <div class="r-item"><div class="r-label">📝 摘要</div>
            <div class="r-value">${r.summary||''}</div></div>`;

    document.getElementById('reportSection').style.display = 'block';
}

function downloadReport() {
    if (!lastReport) return;
    const r = lastReport.report || {};
    let txt = '六智Agent论文工坊 — 查重报告\n' + '='.repeat(40) + '\n\n';
    txt += `重复句子数: ${r.total_matches||0}\n`;
    txt += `修改方案数: ${r.total_modifications||0}\n`;
    txt += `总体建议数: ${r.total_suggestions||0}\n`;
    txt += `风险评估: ${r.risk_assessment||'未知'}\n`;
    txt += `总结: ${r.summary||''}\n`;
    const blob = new Blob([txt],{type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `查重报告_${new Date().toISOString().slice(0,10)}.txt`;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ============ CNKI Captcha ============
let currentCnkiTask = null;

function submitCaptcha(){const a=document.getElementById('captchaAnswer').value.trim();if(!a)return;fetch('/api/cnki/solve/'+currentCnkiTask,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answer:a})});document.getElementById('captchaModal').classList.remove('show')}
function skipCaptcha(){document.getElementById('captchaModal').classList.remove('show')}
function confirmAction(){fetch('/api/cnki/solve/'+currentCnkiTask,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({confirm:true})});document.getElementById('captchaModal').classList.remove('show')}

async function pollCnkiStatus(taskId){try{const r=await fetch('/api/cnki/status/'+taskId);const d=await r.json();if(d.error)return;
if(d.need_action==='captcha'&&d.captcha_image){currentCnkiTask=taskId;document.getElementById('captchaMsg').textContent=d.message;document.getElementById('captchaImg').src='data:image/png;base64,'+d.captcha_image;document.getElementById('captchaImg').style.display='';document.getElementById('captchaAnswer').style.display='';document.getElementById('loginFields').style.display='none';document.getElementById('confirmRow').style.display='none';document.getElementById('captchaModal').classList.add('show')}
else if(d.need_action==='login'){currentCnkiTask=taskId;document.getElementById('captchaMsg').textContent=d.message;if(d.screenshot){document.getElementById('captchaImg').src='data:image/png;base64,'+d.screenshot;document.getElementById('captchaImg').style.display=''}document.getElementById('captchaAnswer').style.display='none';document.getElementById('loginFields').style.display='';document.getElementById('navFields').style.display='none';document.getElementById('confirmRow').style.display='none';document.getElementById('captchaModal').classList.add('show')}
else if(d.need_action==='manual_nav'){currentCnkiTask=taskId;document.getElementById('captchaMsg').textContent=d.message;if(d.screenshot){document.getElementById('captchaImg').src='data:image/png;base64,'+d.screenshot;document.getElementById('captchaImg').style.display=''}document.getElementById('captchaAnswer').style.display='none';document.getElementById('loginFields').style.display='none';document.getElementById('navFields').style.display='';document.getElementById('confirmRow').style.display='none';document.getElementById('captchaModal').classList.add('show')}}catch(e){}}

function submitNavUrl(){const u=document.getElementById('navUrl').value.trim();if(!u)return;fetch('/api/cnki/solve/'+currentCnkiTask,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({new_url:u})});document.getElementById('captchaModal').classList.remove('show')}

function submitLogin(){const u=document.getElementById('loginUser').value.trim();const p=document.getElementById('loginPass').value.trim();if(!u||!p)return;fetch('/api/cnki/solve/'+currentCnkiTask,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});document.getElementById('captchaModal').classList.remove('show')}



async function uploadCnkiPdfs(){var e=document.getElementById("cnkiPdfInput").files;if(!e.length)return;var t=document.getElementById("cnkiPdfStatus");t.textContent="正在解析...";for(var n=0,o=0;o<e.length;o++){var a=new FormData;a.append("file",e[o]);try{var r=await fetch("/api/upload",{method:"POST",body:a}),i=await r.json();i.text&&i.text.length>50&&(cnkiPapers.push({title:e[o].name.replace(".pdf",""),full_text:i.text,url:"",source:"知网CNKI"}),n++)}catch(c){}}t.textContent=n?n+" 篇知网论文全文已解析，启动时自动加入比对池":"解析失败";t.style.color=n?"var(--success)":"var(--danger)"}

function genCnkiUrl(){var e=document.getElementById("paperInput").value.trim();if(!e)return;var t=(e.match(/[一-鿿]{3,8}/g)||[]).filter(function(e,i,a){return a.indexOf(e)===i}).slice(0,5);if(!t.length)t=(e.split(/[\s,，、。；\n]+/).filter(function(e){return e.length>=2}).slice(0,5));if(t.length){document.getElementById("cnkiKwDisplay").textContent="🔑 "+t.join("、")}}function updateCnkiLink(){var e=document.getElementById("cnkiUrlInput").value.trim();var t=document.getElementById("cnkiOpenLink");if(e){t.href=e;t.style.display=""}else{t.href="#";t.style.display="none"}}function generateCnkiScript(){var e=document.getElementById("paperInput").value.trim();if(!e){document.getElementById("cnkiScript").value="请先在上方输入论文内容";return}var t=(e.match(/[一-鿿]{3,8}/g)||[]).filter(function(e,i,a){return a.indexOf(e)===i}).slice(0,5);if(!t.length) t=(e.split(/[\s,，、。；\n]+/).filter(function(e){return e.length>=2}).slice(0,5));if(!t.length){document.getElementById("cnkiScript").value="未能提取关键词";return}var n="https://kns.cnki.net/kns8s/search?classid=YSTT4HG0&kw="+encodeURIComponent(t.join(" "));document.getElementById("cnkiUrlInput").value=n;updateCnkiLink();document.getElementById("cnkiScript").value="// 1.打开上面链接(已自动填入知网搜索URL)\n// 2.按F12 → Console → 粘贴运行\n// 3.控制台输出论文标题列表\n// 4.点击每条标题链接进入详情页 → 手动下载PDF\n// 5.下载完成后回到本站上传\n\n(async function(){\n  console.clear();\n  console.log('=== 论文列表 ===');\n  var papers=[];\n  document.querySelectorAll('a').forEach(function(a){\n    var t=a.innerText.trim();\n    if(t.length>10&&t.length<200&&!t.includes('http')&&!t.includes('<')){\n      if(!papers.find(function(p){return p.title===t})) papers.push({title:t,url:a.href});\n    }\n  });\n  papers=papers.slice(0,15);\n  papers.forEach(function(p,i){\n    console.log((i+1)+'. '+p.title);\n    console.log('   '+p.url);\n    console.log('');\n  });\n  console.log('共'+papers.length+'篇论文，请逐条点击链接进入详情页下载PDF');\n  console.log('下载完成后回到本站上传PDF文件');\n})();\n// 提示:若列表为空请在检索结果页刷新后再运行"}

function downloadDocx() {
    if (!currentTaskId) return;
    const btn = document.getElementById('downloadDocxBtn');
    btn.textContent = '⏳ 下载中...';
    btn.disabled = true;

// ============ Window resize handler ============
function handleResize() {
    const isMobile = window.innerWidth < 768;
    const fab = document.getElementById('fabBtn');
    const tabs = document.getElementById('mobileTabs');

    if (!isMobile) {
        // Desktop: show both panels, hide mobile UI
        document.getElementById('leftPanel').classList.remove('panel-hidden');
        document.getElementById('rightPanel').classList.remove('panel-hidden');
        fab.style.display = 'none';
    } else {
        // Mobile: enforce current tab
        fab.style.display = (currentMobileTab === 'input') ? 'block' : 'none';
    }
    updateFab();
}

window.addEventListener('resize', handleResize);

// ============ Start ============
window.addEventListener('DOMContentLoaded', () => {
    renderAgents();
    onAutoToggle();
    loadSources();
    handleResize();
});
